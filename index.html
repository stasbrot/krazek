<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" id="metaTheme" content="#F2F2F7">
<meta name="description" content="Independent CD printing. Custom artwork on real discs, 100% printed in Poland.">
<title>KRĄŻEK</title>
<style>
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }

  :root{
    --bg:#F2F2F7; --surface:#ffffff; --surface-2:#F5F5F7;
    --ink:#1C1C1E; --ink-2:#86868B; --ink-3:#AEAEB2;
    --sep:rgba(60,60,67,0.12);
    --fill:rgba(120,120,128,0.12);
    --accent:#0A84FF; --accent-press:#0066D6;
    --nav-bg:rgba(242,242,247,0.72);
    --shadow:0 14px 44px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    --radius:22px; --radius-lg:30px;
    --holo:linear-gradient(135deg,#ff7ad9 0%,#ffb86c 24%,#73f7ff 50%,#b3a4ff 72%,#8dffb6 100%);
    --maxw:1080px;
  }
  @media (prefers-color-scheme:dark){
    :root:not([data-theme="light"]){
      --bg:#000000; --surface:#1C1C1E; --surface-2:#2C2C2E;
      --ink:#FFFFFF; --ink-2:#98989F; --ink-3:#636366;
      --sep:rgba(255,255,255,0.10);
      --fill:rgba(120,120,128,0.24);
      --nav-bg:rgba(0,0,0,0.62);
      --shadow:0 14px 44px rgba(0,0,0,0.55);
    }
  }
  :root[data-theme="dark"]{
    --bg:#000000; --surface:#1C1C1E; --surface-2:#2C2C2E;
    --ink:#FFFFFF; --ink-2:#98989F; --ink-3:#636366;
    --sep:rgba(255,255,255,0.10);
    --fill:rgba(120,120,128,0.24);
    --nav-bg:rgba(0,0,0,0.62);
    --shadow:0 14px 44px rgba(0,0,0,0.55);
  }

  html{ scroll-behavior:smooth; scroll-padding-top:74px; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  a{ color:inherit; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:8px; }

  /* ---------- Disc ---------- */
  .disc{
    position:relative; width:var(--disc,240px); aspect-ratio:1; border-radius:50%;
    box-shadow:0 22px 50px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,255,255,.18);
    isolation:isolate; flex:none;
  }
  .disc__spin{
    position:absolute; inset:0; border-radius:50%; overflow:hidden;
    animation:spin 16s linear infinite; animation-play-state:paused; will-change:transform;
  }
  .disc--ambient .disc__spin{ animation-play-state:running; }
  .disc__art{ position:absolute; inset:0; background:var(--art,#ddd); background-size:cover; background-position:center; }
  .disc__sheen{
    position:absolute; inset:0;
    background:conic-gradient(from 0deg,
      rgba(255,0,128,0), rgba(255,200,0,.45), rgba(0,255,200,0),
      rgba(120,120,255,.45), rgba(255,0,200,0), rgba(255,200,0,.45),
      rgba(0,255,200,0), rgba(120,120,255,.45), rgba(255,0,128,0));
    mix-blend-mode:overlay; opacity:.55;
  }
  .disc__rings{
    position:absolute; inset:0;
    background:repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,.05) 0 1px, rgba(0,0,0,.05) 1px 2px);
    mix-blend-mode:soft-light;
  }
  .disc__hub{
    position:absolute; top:50%; left:50%; width:34%; height:34%; transform:translate(-50%,-50%); border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.28), rgba(255,255,255,.04));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.22), 0 0 0 1px rgba(0,0,0,.10);
  }
  .disc__hole{
    position:absolute; top:50%; left:50%; width:11%; height:11%; transform:translate(-50%,-50%); border-radius:50%;
    background:var(--bg); box-shadow:inset 0 2px 4px rgba(0,0,0,.45), 0 0 0 1px rgba(0,0,0,.15);
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    font:600 17px/1 inherit; padding:15px 26px; border-radius:999px; border:0; cursor:pointer;
    text-decoration:none; transition:transform .14s ease, background .2s ease, opacity .2s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{ transform:scale(.96); }
  .btn--primary{ background:var(--accent); color:#fff; }
  .btn--primary:hover{ background:var(--accent-press); }
  .btn--ghost{ background:var(--fill); color:var(--ink); }
  .btn--ghost:hover{ filter:brightness(.96); }

  .icon-btn{
    width:40px; height:40px; border-radius:999px; border:1px solid var(--sep);
    background:var(--fill); color:var(--ink); display:grid; place-items:center; cursor:pointer;
    transition:transform .12s ease, filter .2s; -webkit-tap-highlight-color:transparent; font-size:20px;
  }
  .icon-btn:hover{ filter:brightness(.96); }
  .icon-btn:active{ transform:scale(.92); }

  /* ---------- Nav ---------- */
  .nav{
    position:sticky; top:0; z-index:50;
    backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px);
    background:var(--nav-bg); border-bottom:1px solid var(--sep);
  }
  .nav__inner{ max-width:var(--maxw); margin:0 auto; padding:11px 20px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .brand{ font-weight:700; font-size:20px; letter-spacing:-0.02em; text-decoration:none; color:var(--ink); }
  .nav__links{ display:flex; gap:26px; }
  .nav__link{ color:var(--ink-2); font-size:15px; font-weight:500; text-decoration:none; transition:color .2s; }
  .nav__link--accent{ color:#ff7a5c; font-weight:600; }
  .nav__link:hover{ color:var(--ink); }
  .nav__actions{ display:flex; align-items:center; gap:8px; }
  .cart-btn{ position:relative; }
  .cart-badge{
    position:absolute; top:-3px; right:-3px; min-width:18px; height:18px; padding:0 5px; border-radius:9px;
    background:var(--accent); color:#fff; font-size:11px; font-weight:700; display:grid; place-items:center;
    border:2px solid var(--nav-bg);
  }
  @media (max-width:720px){ .nav__links{ display:none; } }

  /* ---------- Hero ---------- */
  .hero{ position:relative; max-width:var(--maxw); margin:0 auto; padding:62px 20px 36px; text-align:center; }
  .hero__glow{
    position:absolute; top:34px; left:50%; transform:translateX(-50%);
    width:min(440px,82vw); height:min(440px,82vw); background:var(--holo);
    filter:blur(72px); opacity:.34; border-radius:50%; z-index:-1; pointer-events:none;
  }
  .hero__disc{ --disc:clamp(176px,40vw,288px); margin:0 auto 34px; }
  .hero h1{ font-size:clamp(34px,6.2vw,60px); font-weight:700; letter-spacing:-0.03em; line-height:1.04; }
  .hero p{ margin:18px auto 0; max-width:560px; font-size:clamp(16px,2.4vw,20px); color:var(--ink-2); line-height:1.45; }
  .hero__cta{ margin-top:30px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }

  /* ---------- Sections ---------- */
  .section{ max-width:var(--maxw); margin:0 auto; padding:46px 20px; }
  .eyebrow{ text-transform:uppercase; letter-spacing:.13em; font-size:12px; font-weight:700; color:var(--accent); }
  .title{ font-size:clamp(26px,4vw,38px); font-weight:700; letter-spacing:-0.02em; margin-top:10px; }
  .sub{ color:var(--ink-2); font-size:17px; margin-top:8px; max-width:540px; line-height:1.45; }
  .price-tag{ font-weight:700; font-size:22px; color:var(--ink); }
  .note{ color:var(--ink-3); font-size:14px; line-height:1.4; }

  /* Custom */
  .custom__card{
    margin-top:26px; background:var(--surface); border:1px solid var(--sep);
    border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:34px;
    display:grid; grid-template-columns:1fr auto; gap:34px; align-items:center;
  }
  .custom__disc{ --disc:clamp(150px,24vw,220px); }
  .custom__buy{ margin-top:22px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  @media (max-width:760px){
    .custom__card{ grid-template-columns:1fr; text-align:center; justify-items:center; padding:30px 24px; }
    .custom__buy{ justify-content:center; }
  }

  /* Editions */
  .editions-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:22px; margin-top:26px; }
  .product{
    background:var(--surface); border:1px solid var(--sep); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:28px; display:flex; flex-direction:column; align-items:center; text-align:center;
  }
  .product .disc{ --disc:200px; margin-bottom:22px; }
  .product__name{ font-weight:700; font-size:20px; }
  .product__by{ color:var(--ink-2); font-size:14px; margin-top:3px; }
  .product__desc{ color:var(--ink-2); font-size:15px; margin-top:11px; line-height:1.45; }
  .product__foot{ margin-top:20px; width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .product:hover .disc__spin, .custom__card:hover .disc__spin{ animation-play-state:running; }
  @media (max-width:680px){ .editions-grid{ grid-template-columns:1fr; } }

  /* Summer bundle */
  .bundle-card{
    position:relative; overflow:hidden;
    background:linear-gradient(135deg, #ff7a5c, #ff9e35 55%, #ffd166);
    color:#fff; border-radius:var(--radius-lg); padding:40px 36px; text-align:center;
    box-shadow:0 24px 60px rgba(255,122,92,.32);
  }
  .bundle-card::before{
    content:""; position:absolute; inset:-40%;
    background:radial-gradient(circle at 80% 20%, rgba(255,255,255,.25), transparent 50%),
               radial-gradient(circle at 10% 90%, rgba(255,255,255,.15), transparent 45%);
    pointer-events:none;
  }
  .bundle-card > *{ position:relative; }
  .bundle-badge{
    display:inline-block; background:rgba(255,255,255,.24); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    color:#fff; padding:6px 14px; border-radius:999px; font-size:12px; font-weight:700; letter-spacing:.13em; text-transform:uppercase;
  }
  .bundle-title{
    font-size:clamp(28px,5vw,42px); font-weight:800; letter-spacing:-0.02em; line-height:1.1; margin-top:14px;
  }
  .bundle-sub{ color:rgba(255,255,255,.92); max-width:480px; margin:12px auto 0; font-size:16.5px; line-height:1.5; }
  .bundle-grid{
    display:flex; justify-content:center; flex-wrap:wrap; gap:14px; margin-top:28px;
  }
  .bundle-item{
    display:flex; align-items:center; gap:10px; padding:10px 18px; border-radius:999px;
    background:rgba(255,255,255,.18); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    font-size:15px; font-weight:600;
  }
  .bundle-item--free{ background:rgba(255,255,255,.32); font-weight:700; }
  .bundle-num{ font-size:18px; font-weight:800; opacity:.95; }
  .bundle-price-row{
    margin-top:28px; display:flex; justify-content:center; align-items:center; gap:24px; flex-wrap:wrap;
  }
  .bundle-price{ font-size:38px; font-weight:800; letter-spacing:-0.02em; }
  .bundle-old{ font-size:16px; opacity:.7; text-decoration:line-through; margin-top:2px; }
  .bundle-card .btn--primary{
    background:#fff; color:#cc4520;
  }
  .bundle-card .btn--primary:hover{ background:#fff; filter:brightness(.95); }

  /* Design service */
  .design-card{
    background:var(--surface); border:1px solid var(--sep); border-radius:var(--radius-lg);
    box-shadow:var(--shadow); padding:40px 36px; text-align:center;
  }
  .design-ic{
    width:60px; height:60px; border-radius:18px; margin:0 auto 14px;
    background:linear-gradient(160deg,#6f9eff,#2c5cd9); color:#fff;
    display:grid; place-items:center; box-shadow:0 10px 28px rgba(44,92,217,.32);
  }
  .design-card .title{ margin-top:8px; }
  .design-desc{ max-width:540px; margin:14px auto 0; }
  .design-list{
    list-style:none; padding:0; margin:22px auto 0; max-width:480px; text-align:left;
    display:grid; gap:10px;
  }
  .design-list li{
    padding:12px 18px; border-radius:14px; background:var(--fill); color:var(--ink);
    font-size:15px; line-height:1.5; position:relative; padding-left:42px;
  }
  .design-list li::before{
    content:""; position:absolute; left:16px; top:50%; transform:translateY(-50%);
    width:16px; height:16px; border-radius:50%;
    background:var(--accent) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>") center/10px no-repeat;
  }
  .design-buy{
    margin-top:24px; display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap;
  }
  .design-card .note{ margin-top:14px; }

  /* Photographer */
  .photo-card{
    background:var(--surface); border:1px solid var(--sep); border-radius:var(--radius-lg);
    box-shadow:var(--shadow); padding:40px 36px; text-align:center; max-width:720px; margin:26px auto 0;
  }
  .photo-card .title{ margin-top:8px; }
  .photo-role{ color:var(--accent); font-weight:600; font-size:15px; margin-top:4px; }
  .photo-text{ max-width:560px; margin:14px auto 0; }
  .flag-pair{ display:inline-flex; align-items:center; gap:12px; margin-bottom:6px; }
  .flag-pair .flag-x{ color:var(--ink-3); font-weight:600; font-size:18px; }
  .mini-flag{ position:relative; width:38px; height:26px; border-radius:5px; overflow:hidden; box-shadow:0 3px 10px rgba(0,0,0,.18); border:1px solid var(--sep); flex:none; }
  .mini-flag .mf-w{ position:absolute; top:0; left:0; right:0; height:50%; background:#fff; }
  .mini-flag .mf-r{ position:absolute; bottom:0; left:0; right:0; height:50%; background:#d4213d; }
  .mini-flag--cz .mf-r{ background:#d7141a; }
  .mini-flag--cz .mf-b{ position:absolute; top:0; left:0; width:55%; height:100%; background:#11457e; clip-path:polygon(0 0, 100% 50%, 0 100%); }
  .collab-tag{
    display:inline-block; margin-top:20px; padding:8px 16px; border-radius:999px;
    background:var(--fill); color:var(--ink-2); font-size:13px; font-weight:600; letter-spacing:.01em;
  }

  /* Features strip */
  .features{ max-width:var(--maxw); margin:0 auto; padding:8px 20px 8px; }
  .features__row{
    display:grid; grid-template-columns:repeat(4,1fr); gap:14px;
    background:var(--surface); border:1px solid var(--sep); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px;
  }
  .feature{ display:flex; align-items:center; gap:11px; justify-content:center; text-align:left; }
  .feature__ic{ width:34px; height:34px; border-radius:10px; background:var(--fill); display:grid; place-items:center; color:var(--accent); flex:none; }
  .feature__tx{ font-size:14px; font-weight:600; color:var(--ink); line-height:1.2; }
  @media (max-width:760px){
    .features__row{ grid-template-columns:repeat(2,1fr); gap:16px 12px; }
  }
  @media (max-width:420px){
    .features__row{ grid-template-columns:1fr; }
    .feature{ justify-content:flex-start; }
  }

  /* Poland */
  .poland__card{
    position:relative; overflow:hidden; background:var(--surface); border:1px solid var(--sep);
    border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:48px 40px; text-align:center;
  }
  .flag{ width:64px; height:42px; border-radius:9px; overflow:hidden; margin:0 auto 20px; box-shadow:0 4px 14px rgba(0,0,0,.18); border:1px solid var(--sep); }
  .flag__w{ height:50%; background:#fff; }
  .flag__r{ height:50%; background:#D4213D; }
  .poland__big{ font-size:clamp(28px,5vw,44px); font-weight:800; letter-spacing:-0.02em; line-height:1.1; }
  .poland__big em{ font-style:normal; background:var(--holo); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .poland__desc{ color:var(--ink-2); max-width:560px; margin:16px auto 0; font-size:17px; line-height:1.5; }

  /* Independent */
  .indie{ max-width:var(--maxw); margin:0 auto; padding:24px 20px 72px; text-align:center; }
  .indie__title{ font-size:clamp(24px,4vw,34px); font-weight:700; letter-spacing:-0.02em; }
  .indie__text{ max-width:620px; margin:16px auto 0; color:var(--ink-2); font-size:18px; line-height:1.55; }

  /* Footer */
  .footer{ border-top:1px solid var(--sep); }
  .footer__inner{ max-width:var(--maxw); margin:0 auto; padding:28px 20px; display:flex; flex-wrap:wrap; gap:14px; justify-content:space-between; align-items:center; color:var(--ink-2); font-size:14px; }
  .footer__links{ display:flex; flex-wrap:wrap; gap:14px; }
  .footer a{ text-decoration:none; color:var(--ink-2); transition:color .2s; }
  .footer a:hover{ color:var(--ink); }

  /* ---------- Language overlay ---------- */
  .lang-overlay{
    position:fixed; inset:0; z-index:100; display:grid; place-items:center; padding:24px;
    background:var(--nav-bg);
    backdrop-filter:saturate(160%) blur(30px); -webkit-backdrop-filter:saturate(160%) blur(30px);
    transition:opacity .4s ease, visibility .4s ease;
  }
  .lang-overlay.hide{ opacity:0; visibility:hidden; pointer-events:none; }
  .lang-card{
    width:min(420px,100%); background:var(--surface); border:1px solid var(--sep);
    border-radius:var(--radius-lg); box-shadow:0 30px 80px rgba(0,0,0,.34); padding:30px; text-align:center;
  }
  .lang-card__disc{ --disc:86px; margin:0 auto 16px; }
  .lang-card h2{ font-size:22px; font-weight:700; margin-top:4px; }
  .lang-card p{ color:var(--ink-2); font-size:15px; margin-top:6px; }
  .lang-list{ display:grid; gap:10px; margin-top:22px; max-height:56vh; overflow-y:auto; }
  .lang-opt{
    display:flex; align-items:center; gap:14px; width:100%; padding:14px 18px; border-radius:16px;
    border:1px solid var(--sep); background:var(--fill); color:var(--ink); font-size:17px; font-weight:600;
    cursor:pointer; transition:transform .12s ease, background .2s, color .2s; -webkit-tap-highlight-color:transparent;
  }
  .lang-opt:hover{ background:var(--accent); color:#fff; border-color:transparent; }
  .lang-opt:hover .chev{ color:#fff; opacity:.85; }
  .lang-opt:active{ transform:scale(.98); }
  .lang-opt .flag-emoji{ font-size:24px; line-height:1; }
  .lang-opt .chev{ margin-left:auto; color:var(--ink-3); display:inline-flex; }

  /* ---------- Cart ---------- */
  .cart-backdrop{
    position:fixed; inset:0; z-index:80; background:rgba(0,0,0,.38);
    opacity:0; visibility:hidden; transition:opacity .3s, visibility .3s;
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
  }
  .cart-backdrop.open{ opacity:1; visibility:visible; }
  .cart{
    position:fixed; top:0; right:0; bottom:0; z-index:90; width:min(420px,92vw);
    background:var(--surface); box-shadow:-20px 0 60px rgba(0,0,0,.28);
    transform:translateX(100%); transition:transform .38s cubic-bezier(.32,.72,0,1);
    display:flex; flex-direction:column;
  }
  .cart.open{ transform:translateX(0); }
  .cart__head{ padding:18px 22px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--sep); }
  .cart__title{ font-weight:700; font-size:20px; }
  .cart__body{ flex:1; overflow-y:auto; padding:8px 22px; -webkit-overflow-scrolling:touch; }
  .cart__empty{ color:var(--ink-2); text-align:center; padding:48px 0; font-size:15px; }
  .cart-item{ display:flex; gap:14px; align-items:center; padding:14px 0; border-bottom:1px solid var(--sep); }
  .cart-item .disc{ --disc:54px; box-shadow:0 4px 12px rgba(0,0,0,.2); }
  .cart-item__info{ flex:1; min-width:0; }
  .cart-item__name{ font-weight:600; font-size:15px; }
  .cart-item__price{ color:var(--ink-2); font-size:14px; margin-top:2px; }
  .stepper{ display:inline-flex; align-items:center; background:var(--fill); border-radius:999px; }
  .stepper button{ width:30px; height:30px; border:0; background:transparent; color:var(--ink); font-size:19px; line-height:1; cursor:pointer; border-radius:999px; -webkit-tap-highlight-color:transparent; }
  .stepper button:active{ background:var(--sep); }
  .stepper span{ min-width:26px; text-align:center; font-weight:600; font-size:14px; }
  .cart__foot{ padding:18px 22px; border-top:1px solid var(--sep); }
  .cart__total{ display:flex; justify-content:space-between; font-weight:700; font-size:18px; margin-bottom:14px; }

  /* ---------- Upsell modal ---------- */
  .up-backdrop{
    position:fixed; inset:0; z-index:95; background:rgba(0,0,0,.5);
    opacity:0; visibility:hidden; transition:opacity .25s, visibility .25s;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .up-backdrop.open{ opacity:1; visibility:visible; }
  .upsell{
    position:fixed; left:50%; top:50%; transform:translate(-50%, calc(-50% + 14px));
    z-index:96; width:min(440px, 92vw);
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity .3s ease, transform .35s cubic-bezier(.32,.72,0,1), visibility .3s;
  }
  .upsell.open{ opacity:1; visibility:visible; pointer-events:auto; transform:translate(-50%, -50%); }
  .up-card{

  /* ===== State ===== */
  let lang = 'en';
  let cart = [];
  try{ cart = JSON.parse(localStorage.getItem('krazek_cart') || '[]') || []; }catch(e){ cart = []; }
  let toastTimer = null;
  function persistCart(){ try{ localStorage.setItem('krazek_cart', JSON.stringify(cart)); }catch(e){} }

  const SUN  = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v2M12 19.5v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2.5 12h2M19.5 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>';
  const MOON = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5A8.5 8.5 0 1 1 11.5 3 6.6 6.6 0 0 0 21 12.5z"/></svg>';

  /* ===== Helpers ===== */
  function fmt(amount){
    const m = LOCALE[lang];
    const noDecimals = (m.cur === 'CZK'); // Czech crown shown without grosze
    return new Intl.NumberFormat(m.loc, {
      style: 'currency',
      currency: m.cur,
      minimumFractionDigits: noDecimals ? 0 : 2,
      maximumFractionDigits: noDecimals ? 0 : 2
    }).format(amount);
  }

  function discHTML(art, size){
    return '<div class="disc" style="--disc:' + size + ';--art:' + art + '">'
      + '<div class="disc__spin"><div class="disc__art"></div><div class="disc__sheen"></div><div class="disc__rings"></div></div>'
      + '<div class="disc__hub"></div><div class="disc__hole"></div></div>';
  }

  /* ===== Translations / render ===== */
  function applyI18n(){
    const t = T[lang];
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      const k = el.getAttribute('data-i18n');
      if (t[k] != null) el.textContent = t[k];
    });
    document.querySelectorAll('[data-i18n-html]').forEach(function(el){
      const k = el.getAttribute('data-i18n-html');
      if (t[k] != null) el.innerHTML = t[k];
    });
    document.getElementById('customPrice').textContent = t.from + ' ' + fmt(PRICES.custom[lang]);
    document.getElementById('price-edition1').textContent = fmt(PRICES.edition1[lang]);
    document.getElementById('price-edition2').textContent = fmt(PRICES.edition2[lang]);
    /* Bundle: show offer price and crossed-out "real" value (3×custom + 2×digipack) */
    const realBundle = PRICES.custom[lang] * 3 + PRICES.digipack[lang] * 2;
    document.getElementById('bundlePrice').textContent = fmt(PRICES.bundle3[lang]);
    document.getElementById('bundleOld').textContent = fmt(realBundle);
    document.getElementById('designPrice').textContent = fmt(PRICES.design[lang]);
    document.getElementById('langFlag').textContent = FLAG[lang];
    document.title = BRAND + ' - ' + t.metaTitle;
    renderCart();
  }

  function renderCart(){
    persistCart();
    const t = T[lang];
    const body = document.getElementById('cartBody');
    const count = cart.reduce(function(s,i){ return s + i.qty; }, 0);
    const badge = document.getElementById('cartCount');
    badge.textContent = count;
    badge.style.display = count ? 'grid' : 'none';

    if (cart.length === 0){
      body.innerHTML = '<div class="cart__empty">' + t.cartEmpty + '</div>';
      document.getElementById('cartFoot').style.display = 'none';
      return;
    }
    document.getElementById('cartFoot').style.display = 'block';

    let total = 0;
    body.innerHTML = cart.map(function(item){
      const p = PRODUCTS[item.id];
      const price = PRICES[item.id][lang];
      total += price * item.qty;
      const name = t[p.nameKey];
      return '<div class="cart-item">'
        + discHTML(p.art, '54px')
        + '<div class="cart-item__info"><div class="cart-item__name">' + name + '</div>'
        + '<div class="cart-item__price">' + fmt(price) + '</div></div>'
        + '<div class="stepper">'
        + '<button onclick="changeQty(\'' + item.id + '\',-1)" aria-label="-">\u2212</button>'
        + '<span>' + item.qty + '</span>'
        + '<button onclick="changeQty(\'' + item.id + '\',1)" aria-label="+">+</button>'
        + '</div></div>';
    }).join('');
    document.getElementById('cartTotalVal').textContent = fmt(total);
  }

  /* ===== Cart actions ===== */
  function addToCart(id){
    const found = cart.find(function(i){ return i.id === id; });
    if (found) found.qty++; else cart.push({ id:id, qty:1 });
    renderCart();
    showToast(T[lang].added);
    /* Show digipack upsell only for CDs, and only if no digipack is already in the cart */
    const isCD = (id === 'custom' || id === 'edition1' || id === 'edition2');
    const hasDigipack = cart.some(function(i){ return i.id === 'digipack'; });
    if (isCD && !hasDigipack){
      setTimeout(openUpsell, 350);
    }
  }
  function addDigipack(id){
    const found = cart.find(function(i){ return i.id === id; });
    if (found) found.qty++; else cart.push({ id:id, qty:1 });
    renderCart();
    showToast(T[lang].added);
    closeUpsell();
  }
  function openUpsell(){
    /* Refresh price in the upsell, then show */
    document.getElementById('upPricePlain').textContent = fmt(PRICES.digipack[lang]);
    document.getElementById('upBackdrop').classList.add('open');
    document.getElementById('upsell').classList.add('open');
  }
  function closeUpsell(){
    document.getElementById('upBackdrop').classList.remove('open');
    document.getElementById('upsell').classList.remove('open');
  }
  function changeQty(id, d){
    const found = cart.find(function(i){ return i.id === id; });
    if (!found) return;
    found.qty += d;
    if (found.qty <= 0) cart = cart.filter(function(i){ return i.id !== id; });
    renderCart();
  }
  function openCart(){
    document.getElementById('cartBackdrop').classList.add('open');
    document.getElementById('cartDrawer').classList.add('open');
  }
  function closeCart(){
    document.getElementById('cartBackdrop').classList.remove('open');
    document.getElementById('cartDrawer').classList.remove('open');
  }
  async function checkout(){
    if (!CHECKOUT_URL){ showToast(T[lang].checkoutMsg); return; }
    if (cart.length === 0) return;
    const btn = document.getElementById('checkoutBtn');
    try{
      if (btn) btn.disabled = true;
      showToast(T[lang].paymentProcessing);
      const res = await fetch(CHECKOUT_URL, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ cart: cart.map(function(i){ return { id:i.id, qty:i.qty }; }) })
      });
      if (!res.ok) throw new Error('bad response');
      const data = await res.json();
      if (data && data.url){ window.location.href = data.url; return; }
      throw new Error('no url');
    }catch(e){
      showToast(T[lang].paymentError);
      if (btn) btn.disabled = false;
    }
  }

  /* ===== Language ===== */
  function setLang(l){
    lang = l;
    try{ localStorage.setItem('krazek_lang', l); }catch(e){}
    applyI18n();
    closeLang();
  }
  function openLang(){ document.getElementById('langOverlay').classList.remove('hide'); }
  function closeLang(){ document.getElementById('langOverlay').classList.add('hide'); }

  /* ===== Theme ===== */
  function currentTheme(){
    const attr = document.documentElement.getAttribute('data-theme');
    if (attr) return attr;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  function toggleTheme(){
    const next = currentTheme() === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    updateThemeIcon();
    updateMetaTheme();
  }
  function updateThemeIcon(){
    document.getElementById('themeBtn').innerHTML = currentTheme() === 'dark' ? SUN : MOON;
  }
  function updateMetaTheme(){
    document.getElementById('metaTheme').setAttribute('content', currentTheme() === 'dark' ? '#000000' : '#F2F2F7');
  }

  /* ===== Toast ===== */
  function showToast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 1900);
  }

  /* ===== Scroll reveal ===== */
  function initReveal(){
    const els = document.querySelectorAll('.reveal');
    if (!('IntersectionObserver' in window)){
      els.forEach(function(e){ e.classList.add('in'); });
      return;
    }
    const io = new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if (en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); }
      });
    }, { threshold:0.12 });
    els.forEach(function(e){ io.observe(e); });
  }

  /* ===== Init ===== */
  document.querySelectorAll('.js-brand').forEach(function(e){ e.textContent = BRAND; });
  updateThemeIcon();
  updateMetaTheme();
  /* Restore saved language and skip the picker if we already know it */
  try{
    const saved = localStorage.getItem('krazek_lang');
    if (saved && T[saved]){
      lang = saved;
      document.getElementById('langOverlay').classList.add('hide');
    }
  }catch(e){}

  applyI18n();
  initReveal();

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(){
    if (!document.documentElement.getAttribute('data-theme')){ updateThemeIcon(); updateMetaTheme(); }
  });
</script>
